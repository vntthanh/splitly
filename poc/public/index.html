<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splitly OCR → Bill PoC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Splitly · Proof of Concept</p>
        <h1>Receipt OCR → Draft Bill</h1>
        <p>Upload an image to run validation, OCR, normalization and bill persistence in one request.</p>
      </header>
      <form id="receipt-form">
        <label class="drop-zone">
          <span>Choose a JPG, PNG or SVG receipt</span>
          <small>Maximum 5 MB · SVG is provided only for the offline fixture demo</small>
          <input id="file" name="file" type="file" accept="image/jpeg,image/png,image/svg+xml" required />
        </label>
        <img id="preview" alt="Receipt preview" hidden />
        <button type="submit">Process receipt</button>
      </form>
      <p id="status" role="status"></p>
      <section id="warnings" hidden></section>
      <section id="result" hidden>
        <div>
          <h2>Extracted data</h2>
          <pre id="extracted"></pre>
        </div>
        <div>
          <h2>Created bill</h2>
          <pre id="bill"></pre>
        </div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
